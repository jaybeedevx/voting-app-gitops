name: Provision EKS Platform

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/environments/prod
  PLATFORM_DIR: infrastructure/platform

# ---------------------------------------------------
# 1️⃣ CREATE CLUSTER
# ---------------------------------------------------
jobs:
  create-cluster:
    name: Terraform - Create EKS
    runs-on: ubuntu-latest

    outputs:
      cluster_name: ${{ steps.tf-output.outputs.cluster_name }}

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::159014723635:role/github-actions-eks
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (EKS)
        working-directory: infrastructure/environments/prod
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: infrastructure/environments/prod
        run: terraform plan -var-file=terraform.tfvars

      - name: Terraform Apply
        working-directory: infrastructure/environments/prod
        run: terraform apply -auto-approve -var-file=terraform.tfvars

      - name: Get Cluster Name Output
        id: tf-output
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

# ---------------------------------------------------
# 2️⃣ WAIT FOR CLUSTER
# ---------------------------------------------------
  wait-cluster:
    name: Wait for EKS Ready
    needs: create-cluster
    runs-on: ubuntu-latest

    outputs:
      cluster_name: ${{ needs.create-cluster.outputs.cluster_name }}

    steps:
      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-eks
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait until ACTIVE
        run: |
          CLUSTER="${{ needs.create-cluster.outputs.cluster_name }}"

          for i in {1..40}; do
            STATUS=$(aws eks describe-cluster \
              --name $CLUSTER \
              --query "cluster.status" \
              --output text)

            echo "Cluster status: $STATUS"

            if [ "$STATUS" == "ACTIVE" ]; then
              exit 0
            fi

            sleep 30
          done

          echo "Cluster did not become ACTIVE in time"
          exit 1

# ---------------------------------------------------
# 3️⃣ INSTALL EKS COMPONENTS
# ---------------------------------------------------
  install-addons:
    name: Install EKS Add-ons
    needs: wait-cluster
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.PLATFORM_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-eks
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.wait-cluster.outputs.cluster_name }} \
            --region $AWS_REGION

      - name: Verify Cluster Access
        run: |
          kubectl get nodes

      - name: Setup Terraform (Platform)
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Platform)
        working-directory: infrastructure/platform
        run: terraform init

      - name: Terraform Apply (Platform Add-ons)
        working-directory: infrastructure/platform
        run: terraform apply -auto-approve
